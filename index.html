<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>攝影比賽作品展示</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:"Microsoft JhengHei";
}

header{
    text-align:center;
    padding:30px;
    background:white;
}

h1{
    margin:0;
}

.gallery{
    column-count:4;
    column-gap:15px;
    padding:20px;
}

.item{
    break-inside:avoid;
    margin-bottom:15px;
}

.item img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.number{
    text-align:center;
    padding:5px;
    font-weight:bold;
}

@media(max-width:1000px){
    .gallery{
        column-count:3;
    }
}

@media(max-width:768px){
    .gallery{
        column-count:2;
    }
}

@media(max-width:480px){
    .gallery{
        column-count:1;
    }
}

.vote-area{
    text-align:center;
    background:white;
    padding:40px;
}

.vote-area img{
    width:250px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:95%;
    max-height:95%;
}

</style>
</head>

<body>

<header>
    <h1>攝影比賽作品展示</h1>
    <p>歡迎欣賞所有參賽作品</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="vote-area">

    <h2>我要投票</h2>

    <p>請掃描 QR CODE 進入投票頁面</p>

    <img src="qrcode.png">

</div>

<div class="modal" id="modal">
    <img id="modalImg">
</div>

<script>

const gallery = document.getElementById('gallery');

for(let i=1;i<=59;i++){

    let num = String(i).padStart(3,'0');

    let div = document.createElement('div');
    div.className='item';

    div.innerHTML=`
        <img src="photos/${num}.jpg" onclick="showImg(this.src)">
        <div class="number">${num}</div>
    `;

    gallery.appendChild(div);
}

function showImg(src){

    document.getElementById('modal').style.display='flex';
    document.getElementById('modalImg').src=src;
}

document.getElementById('modal').onclick=()=>{
    document.getElementById('modal').style.display='none';
}

</script>

</body>
</html>
